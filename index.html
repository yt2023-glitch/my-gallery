<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Photo Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --text: #e8e6e0;
    --muted: #888;
    --accent: #c8a96e;
    --accent2: #e8d5b0;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    padding: 32px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.02em;
  }
  .logo span { color: var(--accent); }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .album-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
  }
  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #1a1200; font-weight: 500; }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #1a1200; border-color: var(--accent); font-weight: 500; }
  .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }

  /* ── ADD PHOTO PANEL ── */
  .add-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin: 20px 40px;
    gap: 12px;
    flex-direction: column;
  }
  .add-panel.open { display: flex; }
  .add-panel h3 { font-size: 15px; color: var(--accent2); font-family: 'Playfair Display', serif; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .field {
    flex: 1;
    min-width: 180px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .field:focus { border-color: var(--accent); }
  .field option { background: var(--bg); }
  .hint { font-size: 11px; color: var(--muted); }

  /* ── GALLERY GRID ── */
  .gallery-wrap { padding: 28px 40px; }
  .album-label {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--accent2);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .album-label small { font-size: 13px; color: var(--muted); font-family: 'DM Sans', sans-serif; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .thumb {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.35s ease, opacity 0.2s;
  }
  .thumb:hover img { transform: scale(1.06); }
  .thumb-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.25s;
    display: flex;
    align-items: flex-end;
    padding: 10px;
  }
  .thumb:hover .thumb-overlay { opacity: 1; }
  .thumb-name {
    font-size: 12px;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .thumb-del {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,0.6);
    border: none; color: #fff;
    width: 24px; height: 24px;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .thumb:hover .thumb-del { display: flex; }
  .thumb-del:hover { background: #c0392b; }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty svg { display: block; margin: 0 auto 12px; opacity: 0.3; }

  /* ── LIGHTBOX ── */
  #lb {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #lb.open { display: flex; }

  .lb-top {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    z-index: 10;
  }
  .lb-title { font-size: 14px; color: rgba(255,255,255,0.8); }
  .lb-counter { font-size: 13px; color: var(--muted); }
  .lb-controls { display: flex; gap: 8px; }
  .lb-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 38px; height: 38px;
    border-radius: 8px;
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .lb-btn:hover { background: rgba(255,255,255,0.2); }
  .lb-btn.close-btn { font-size: 20px; }

  .lb-img-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  #lb-img {
    max-width: 92vw;
    max-height: 88vh;
    object-fit: contain;
    border-radius: 4px;
    transition: transform 0.3s ease, opacity 0.2s;
    transform-origin: center center;
    cursor: grab;
    user-select: none;
  }
  #lb-img.dragging { cursor: grabbing; }
  #lb-img.fade { opacity: 0; }

  /* Fullscreen mode — image fills entire screen */
  #lb.is-fullscreen #lb-img {
    max-width: 100vw !important;
    max-height: 100vh !important;
    width: 100vw !important;
    height: 100vh !important;
    border-radius: 0;
  }
  #lb.is-fullscreen .lb-img-wrap {
    width: 100vw !important;
    height: 100vh !important;
  }

  .lb-arrow {
    position: fixed;
    top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    width: 48px; height: 64px;
    border-radius: 8px;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, opacity 0.2s;
    z-index: 10;
  }
  .lb-arrow:hover { background: rgba(255,255,255,0.18); }
  #lb-prev { left: 12px; }
  #lb-next { right: 12px; }

  .lb-zoom-hint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,0.3);
    pointer-events: none;
  }

  /* ── MANAGE ALBUMS MODAL ── */
  #album-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 9998;
    align-items: center;
    justify-content: center;
  }
  #album-modal.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 420px;
    max-width: 95vw;
    max-height: 80vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .modal-box h3 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent2); }
  .album-list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
  }
  .album-list-item button {
    background: none; border: none;
    color: #c0392b; cursor: pointer; font-size: 16px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header, .toolbar, .gallery-wrap { padding-left: 16px; padding-right: 16px; }
    .add-panel { margin: 12px 16px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PASSWORD SCREEN ── */
  #pw-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #pw-screen.hidden { display: none; }
  .pw-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    width: 340px;
    max-width: 92vw;
    display: flex;
    flex-direction: column;
    gap: 18px;
    text-align: center;
  }
  .pw-logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--accent2);
  }
  .pw-logo span { color: var(--accent); }
  .pw-subtitle { font-size: 13px; color: var(--muted); margin-top: -8px; }
  .pw-input-wrap { position: relative; }
  #pw-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 44px 12px 16px;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.1em;
  }
  #pw-input:focus { border-color: var(--accent); }
  #pw-input.error { border-color: #c0392b; animation: shake 0.3s ease; }
  .pw-eye {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; padding: 4px;
  }
  .pw-eye:hover { color: var(--text); }
  #pw-error { font-size: 12px; color: #e74c3c; min-height: 16px; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="pw-screen">
  <div class="pw-box">
    <div class="pw-logo">My <span>Gallery</span></div>
    <p class="pw-subtitle">Enter password to continue</p>
    <div class="pw-input-wrap">
      <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') checkPassword()">
      <button class="pw-eye" onclick="togglePwEye()" id="pw-eye-btn">👁</button>
    </div>
    <div id="pw-error"></div>
    <button class="btn primary" onclick="checkPassword()" style="width:100%;justify-content:center;padding:12px;">
      Unlock Gallery
    </button>
  </div>
</div>

<header>
  <div class="logo">My <span>Gallery</span></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn" onclick="openAlbumModal()">⊞ Manage Albums</button>
    <button class="btn primary" onclick="toggleAddPanel()">＋ Add Photo</button>
  </div>
</header>

<!-- ADD PHOTO PANEL -->
<div class="add-panel" id="add-panel">
  <h3>Add a Photo</h3>
  <div class="row">
    <input class="field" id="inp-url" placeholder="Paste image URL (from any free host)" style="flex:2">
    <input class="field" id="inp-name" placeholder="Photo name (optional)">
  </div>
  <div class="row">
    <select class="field" id="inp-album"></select>
    <button class="btn primary" onclick="addPhoto()" style="flex:0 0 auto">Add to Gallery</button>
  </div>
  <p class="hint">Supports: ImgBB, Postimages, Flickr direct links, Google Drive (public), or any direct image URL ending in .jpg/.png/.webp etc.</p>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="album-tabs" id="tabs"></div>
</div>

<!-- GALLERY -->
<div class="gallery-wrap">
  <div class="album-label" id="album-label">All Photos <small id="photo-count"></small></div>
  <div class="grid" id="grid"></div>
</div>

<!-- LIGHTBOX -->
<div id="lb">
  <div class="lb-top">
    <div>
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-counter" id="lb-counter"></div>
    </div>
    <div class="lb-controls">
      <button class="lb-btn" title="Rotate left" onclick="rotate(-90)">↺</button>
      <button class="lb-btn" title="Rotate right" onclick="rotate(90)">↻</button>
      <button class="lb-btn" title="Zoom out" onclick="zoomBy(-0.25)">－</button>
      <button class="lb-btn" title="Zoom in" onclick="zoomBy(0.25)">＋</button>
      <button class="lb-btn" title="Reset zoom & rotation" onclick="resetTransform()" style="font-size:13px">Reset</button>
      <button class="lb-btn" id="fs-btn" title="Fullscreen (F)" onclick="toggleFullscreen()">⛶</button>
      <button class="lb-btn close-btn" title="Close (Esc)" onclick="closeLb()">✕</button>
    </div>
  </div>

  <button class="lb-arrow" id="lb-prev" onclick="navigate(-1)">‹</button>
  <div class="lb-img-wrap" id="lb-img-wrap">
    <img id="lb-img" src="" alt="" draggable="false">
  </div>
  <button class="lb-arrow" id="lb-next" onclick="navigate(1)">›</button>

  <div class="lb-zoom-hint">Scroll to zoom · Drag to pan · ← → navigate · F fullscreen · Esc close</div>
</div>

<!-- MANAGE ALBUMS MODAL -->
<div id="album-modal">
  <div class="modal-box">
    <h3>Manage Albums</h3>
    <div class="row">
      <input class="field" id="new-album-name" placeholder="New album name">
      <button class="btn primary" onclick="createAlbum()" style="flex:0 0 auto">Create</button>
    </div>
    <div id="album-list"></div>
    <button class="btn" onclick="closeAlbumModal()" style="align-self:flex-end">Done</button>
  </div>
</div>

<script>
// ── CONFIG ──
const API = 'https://script.google.com/macros/s/AKfycbxNq9RrSAe1WsPou2rvCY5VJcAFSPUBLqM7KrZ1fiweclLKwIehbWWC7kGQfQHoT9Bt2Q/exec';

// ── STATE ──
let data = { albums: ['Favourites', 'Nature', 'Travel'], photos: [] };
let currentAlbum = 'all';
let lbIndex = 0;
let lbPhotos = [];
let rot = 0, scale = 1, panX = 0, panY = 0;
let isDragging = false, startX, startY, startPanX, startPanY;
const rotationMap = {}; // stores rotation per photo keyed by photo.added

// ── API HELPERS ──
async function apiGet() {
  try {
    const res = await fetch(API);
    const json = await res.json();
    data.photos = json.photos || [];
    // derive albums from photos + default ones
    const fromPhotos = [...new Set(data.photos.map(p => p.album).filter(Boolean))];
    const saved = JSON.parse(localStorage.getItem('gallery_albums') || '["Favourites","Nature","Travel"]');
    data.albums = [...new Set([...saved, ...fromPhotos])];
  } catch(e) { showToast('Could not load photos. Check your connection.', true); }
}

async function apiPost(payload) {
  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
  } catch(e) { showToast('Sync failed. Please try again.', true); }
}

function saveAlbums() {
  localStorage.setItem('gallery_albums', JSON.stringify(data.albums));
}

// ── TOAST ──
function showToast(msg, isError) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;z-index:99999;transition:opacity 0.3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.borderColor = isError ? '#c0392b' : 'var(--accent)';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 3000);
}

// ── LOADING ──
function setLoading(on) {
  const btn = document.querySelector('.btn.primary[onclick="addPhoto()"]');
  if (btn) btn.textContent = on ? 'Saving…' : 'Add to Gallery';
  document.getElementById('grid').style.opacity = on ? '0.5' : '1';
}

// ── ALBUMS ──
function renderTabs() {
  const tabs = document.getElementById('tabs');
  const sel = document.getElementById('inp-album');
  tabs.innerHTML = '';
  sel.innerHTML = '';

  const allTab = document.createElement('button');
  allTab.className = 'tab' + (currentAlbum === 'all' ? ' active' : '');
  allTab.textContent = 'All Photos';
  allTab.onclick = () => { currentAlbum = 'all'; renderAll(); };
  tabs.appendChild(allTab);

  data.albums.forEach(a => {
    const t = document.createElement('button');
    t.className = 'tab' + (currentAlbum === a ? ' active' : '');
    t.textContent = a;
    t.onclick = () => { currentAlbum = a; renderAll(); };
    tabs.appendChild(t);

    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    sel.appendChild(opt);
  });
}

function openAlbumModal() {
  renderAlbumList();
  document.getElementById('album-modal').classList.add('open');
}
function closeAlbumModal() {
  document.getElementById('album-modal').classList.remove('open');
  renderAll();
}
function renderAlbumList() {
  const list = document.getElementById('album-list');
  list.innerHTML = data.albums.length ? '' : '<p style="color:var(--muted);font-size:13px">No albums yet.</p>';
  data.albums.forEach((a, i) => {
    const d = document.createElement('div');
    d.className = 'album-list-item';
    d.innerHTML = `<span>${a}</span><button title="Delete album" onclick="deleteAlbum(${i})">🗑</button>`;
    list.appendChild(d);
  });
}
function createAlbum() {
  const name = document.getElementById('new-album-name').value.trim();
  if (!name || data.albums.includes(name)) return;
  data.albums.push(name);
  document.getElementById('new-album-name').value = '';
  saveAlbums(); renderTabs(); renderAlbumList();
}
function deleteAlbum(i) {
  const name = data.albums[i];
  if (!confirm(`Delete album "${name}"? Photos won't be deleted.`)) return;
  data.albums.splice(i, 1);
  if (currentAlbum === name) currentAlbum = 'all';
  saveAlbums(); renderTabs(); renderAlbumList();
}

// ── PHOTOS ──
async function addPhoto() {
  const url = document.getElementById('inp-url').value.trim();
  const name = document.getElementById('inp-name').value.trim();
  const album = document.getElementById('inp-album').value;
  if (!url) { alert('Please paste an image URL.'); return; }
  const added = Date.now();
  const photo = { url, name: name || 'Photo', album, added };
  setLoading(true);
  await apiPost({ action: 'add', ...photo });
  data.photos.push(photo);
  document.getElementById('inp-url').value = '';
  document.getElementById('inp-name').value = '';
  setLoading(false);
  showToast('Photo added! Visible on all devices ✓');
  renderGrid();
}

async function deletePhoto(id) {
  if (!confirm('Remove this photo?')) return;
  data.photos = data.photos.filter(p => String(p.added) !== String(id));
  renderGrid();
  await apiPost({ action: 'delete', added: id });
  showToast('Photo removed.');
}

function getVisible() {
  return currentAlbum === 'all' ? [...data.photos] : data.photos.filter(p => p.album === currentAlbum);
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const label = document.getElementById('album-label');
  const count = document.getElementById('photo-count');
  const visible = getVisible();

  label.childNodes[0].textContent = currentAlbum === 'all' ? 'All Photos ' : currentAlbum + ' ';
  count.textContent = `${visible.length} photo${visible.length !== 1 ? 's' : ''}`;

  if (!visible.length) {
    grid.innerHTML = `<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>No photos here yet. Click "Add Photo" to get started.</div>`;
    return;
  }

  grid.innerHTML = '';
  visible.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `
      <img src="${p.url}" alt="${p.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect width=%22200%22 height=%22200%22 fill=%22%23222%22/><text x=%2250%%22 y=%2250%%22 fill=%22%23555%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 font-size=%2213%22>Load failed</text></svg>'">
      <div class="thumb-overlay"><span class="thumb-name">${p.name}</span></div>
      <button class="thumb-del" title="Remove" onclick="event.stopPropagation();deletePhoto(${p.added})">✕</button>`;
    div.addEventListener('click', () => openLb(i, visible));
    grid.appendChild(div);
  });
}

function renderAll() { renderTabs(); renderGrid(); }

// ── LIGHTBOX ──
function openLb(index, photos) {
  lbPhotos = photos;
  lbIndex = index;
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
  showLbPhoto();
}
function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
}
function showLbPhoto() {
  const p = lbPhotos[lbIndex];
  const img = document.getElementById('lb-img');
  img.classList.add('fade');
  // Restore saved rotation for this photo, default to 0
  rot = rotationMap[p.added] || 0;
  scale = 1; panX = 0; panY = 0;
  applyTransform(false);
  setTimeout(() => {
    img.src = p.url;
    img.classList.remove('fade');
  }, 150);
  document.getElementById('lb-title').textContent = p.name;
  document.getElementById('lb-counter').textContent = `${lbIndex + 1} / ${lbPhotos.length}  ·  ${p.album}`;
  document.getElementById('lb-prev').style.opacity = lbIndex > 0 ? '1' : '0.3';
  document.getElementById('lb-next').style.opacity = lbIndex < lbPhotos.length - 1 ? '1' : '0.3';
}
function navigate(dir) {
  const next = lbIndex + dir;
  if (next < 0 || next >= lbPhotos.length) return;
  lbIndex = next;
  showLbPhoto();
}

// ── TRANSFORM ──
function applyTransform(animate) {
  const img = document.getElementById('lb-img');
  img.style.transition = animate === false ? 'none' : 'transform 0.25s ease';
  img.style.transform = `translate(${panX}px, ${panY}px) rotate(${rot}deg) scale(${scale})`;
  if (!!document.fullscreenElement) applyFsImageSize();
}
function rotate(deg) {
  rot += deg;
  // Save this rotation for the current photo
  const p = lbPhotos[lbIndex];
  if (p) rotationMap[p.added] = rot;
  applyTransform();
}
function zoomBy(delta) {
  scale = Math.max(0.2, Math.min(8, scale + delta));
  applyTransform();
}
function resetTransform(animate) {
  rot = 0; scale = 1; panX = 0; panY = 0;
  applyTransform(animate);
}

// ── FULLSCREEN ──
function applyFsImageSize() {
  const img = document.getElementById('lb-img');
  // Normalise rotation to 0–359
  const normalRot = ((rot % 360) + 360) % 360;
  const isSideways = normalRot === 90 || normalRot === 270;
  if (isSideways) {
    // Image is visually landscape but CSS still thinks it's portrait.
    // Set width = screen height and height = screen width so it fills correctly.
    img.style.width     = '100vh';
    img.style.height    = '100vw';
    img.style.maxWidth  = '100vh';
    img.style.maxHeight = '100vw';
  } else {
    img.style.width     = '100vw';
    img.style.height    = '100vh';
    img.style.maxWidth  = '100vw';
    img.style.maxHeight = '100vh';
  }
  img.style.borderRadius = '0';
}

function setFsStyles(on) {
  const img = document.getElementById('lb-img');
  const wrap = document.getElementById('lb-img-wrap');
  const btn = document.getElementById('fs-btn');
  if (on) {
    wrap.style.width  = '100vw';
    wrap.style.height = '100vh';
    applyFsImageSize();
    btn.textContent = '⊡';
    btn.title = 'Exit fullscreen (F)';
  } else {
    img.style.maxWidth     = '92vw';
    img.style.maxHeight    = '88vh';
    img.style.width        = '';
    img.style.height       = '';
    img.style.borderRadius = '4px';
    wrap.style.width       = '100vw';
    wrap.style.height      = '100vh';
    btn.textContent = '⛶';
    btn.title = 'Fullscreen (F)';
  }
}

function toggleFullscreen() {
  const lb = document.getElementById('lb');
  if (!document.fullscreenElement) {
    lb.requestFullscreen()
      .then(() => setFsStyles(true))
      .catch(() => setFsStyles(true)); // fallback for iframe/embed
  } else {
    document.exitFullscreen();
    setFsStyles(false);
  }
}

document.addEventListener('fullscreenchange', () => {
  setFsStyles(!!document.fullscreenElement);
});

// ── SCROLL TO ZOOM ──
document.getElementById('lb-img-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  zoomBy(e.deltaY < 0 ? 0.15 : -0.15);
}, { passive: false });

// ── DRAG TO PAN ──
const lbImg = document.getElementById('lb-img');
lbImg.addEventListener('mousedown', e => {
  isDragging = true; startX = e.clientX; startY = e.clientY;
  startPanX = panX; startPanY = panY;
  lbImg.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  panX = startPanX + e.clientX - startX;
  panY = startPanY + e.clientY - startY;
  applyTransform(false);
});
window.addEventListener('mouseup', () => { isDragging = false; lbImg.classList.remove('dragging'); });

// Touch drag
lbImg.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startPanX = panX; startPanY = panY;
  }
}, { passive: true });
lbImg.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  panX = startPanX + e.touches[0].clientX - startX;
  panY = startPanY + e.touches[0].clientY - startY;
  applyTransform(false);
}, { passive: true });
lbImg.addEventListener('touchend', () => { isDragging = false; });

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'Escape') closeLb();
  if (e.key === '+' || e.key === '=') zoomBy(0.25);
  if (e.key === '-') zoomBy(-0.25);
  if (e.key === 'r' || e.key === 'R') rotate(90);
  if (e.key === '0') resetTransform();
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

// ── ADD PANEL TOGGLE ──
function toggleAddPanel() {
  document.getElementById('add-panel').classList.toggle('open');
}

// ── PASSWORD ──
const PW_HASH = 'b9ffefb2d2cb9d42865ec8342cd7747d17a54b2d13dcdd3eb7dc7fde178a7939';
let isUnlocked = false;

async function hashPassword(pw) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pw + 'gallery_salt_v1');
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPassword() {
  const input = document.getElementById('pw-input').value;
  const err = document.getElementById('pw-error');
  if (!input) { err.textContent = 'Please enter the password.'; return; }
  const hashed = await hashPassword(input);
  if (hashed === PW_HASH) {
    isUnlocked = true;
    document.getElementById('pw-screen').classList.add('hidden');
    if (!galleryLoaded) loadGallery();
  } else {
    err.textContent = 'Incorrect password. Try again.';
    const inp = document.getElementById('pw-input');
    inp.classList.add('error');
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 400);
  }
}

function togglePwEye() {
  const inp = document.getElementById('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function lockGallery() {
  isUnlocked = false;
  document.getElementById('pw-screen').classList.remove('hidden');
  const inp = document.getElementById('pw-input');
  inp.value = '';
  inp.type = 'password';
  document.getElementById('pw-error').textContent = '';
  setTimeout(() => inp.focus(), 100);
}

// Lock when tab is hidden, unlock prompt when tab comes back
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    lockGallery();
  }
});

let galleryLoaded = false;
async function loadGallery() {
  galleryLoaded = true;
  document.getElementById('grid').innerHTML = `<div class="empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10" stroke="var(--accent)"/></svg><br>Loading your gallery…</div>`;
  await apiGet();
  renderAll();
}

// ── INIT ──
document.getElementById('pw-input').focus();
</script>
